# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Code Checks

on:
  workflow_call:
    inputs:
      docs_only:
        description: Skip building if docs only
        required: false
        type: string
        default: "false"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  linux-checks:
    if: ${{ inputs.docs_only == 'false' }}
    timeout-minutes: 30
    runs-on: ["self-hosted", "Linux", "X64", "1ES.Pool=hld-kvm-amd", "JobId=linux-checks-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hyperlight-dev/ci-setup-workflow@f6bd9cc86d0737976d2128c8b8ced8edc017cbb4  # v1.9.0
        with:
          rust-toolchain: "1.89" 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix cargo home permissions
        run: |
          sudo chown -R $(id -u):$(id -g) /opt/cargo || true

      # cargo-hyperlight builds a custom sysroot for x86_64-hyperlight-none target.
      # rust-cache cleans "anything not a dependency" from target dirs, removing the sysroot.
      # We cache sysroot separately to avoid rebuilding it (~10s) on every run.
      - name: Sysroot cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            src/tests/rust_guests/target/sysroot
          key: sysroot-linux-${{ hashFiles('rust-toolchain.toml') }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: "code-checks-linux"
          cache-on-failure: "true"
          # Only save on main as caches are not shared across branches.
          # https://docs.github.com/en/actions/reference/workflows-and-actions/dependency-caching#restrictions-for-accessing-a-cache
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            . -> target
            src/tests/rust_guests -> target

      - name: Ensure up-to-date Cargo.lock
        run: |
          cargo fetch --locked
          cargo fetch --manifest-path src/tests/rust_guests/Cargo.toml --locked

      - name: fmt
        run: just fmt-check

      - name: Install cargo-hyperlight
        run: cargo install cargo-hyperlight --version 0.1.10 --locked --force

      - name: clippy exhaustive check (debug)
        run: just clippy-exhaustive debug

      - name: clippy exhaustive check (release)
        run: just clippy-exhaustive release

      - name: Verify MSRV
        run: ./dev/verify-msrv.sh hyperlight-host hyperlight-guest hyperlight-guest-bin hyperlight-common

      - name: Check 32-bit builds (Nanvix compatibility)
        run: |
          rustup target add i686-unknown-linux-gnu
          just check-i686 debug

      - name: Check cargo features compile
        run: just check

      - name: Check compilation with no default features
        run: |
          just test-compilation-no-default-features debug
          just test-compilation-no-default-features release

  windows-checks:
    if: ${{ inputs.docs_only == 'false' }}
    timeout-minutes: 30
    runs-on: ["self-hosted", "Windows", "X64", "1ES.Pool=hld-win2025-amd", "JobId=windows-checks-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hyperlight-dev/ci-setup-workflow@f6bd9cc86d0737976d2128c8b8ced8edc017cbb4  # v1.9.0
        with:
          rust-toolchain: "1.89" 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # cargo-hyperlight builds a custom sysroot for x86_64-hyperlight-none target.
      # rust-cache cleans "anything not a dependency" from target dirs, removing the sysroot.
      # We cache sysroot separately to avoid rebuilding it (~10s) on every run.
      - name: Sysroot cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            src/tests/rust_guests/target/sysroot
          key: sysroot-windows-${{ hashFiles('rust-toolchain.toml') }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: "code-checks-windows"
          cache-on-failure: "true"
          # Only save on main as caches are not shared across branches.
          # https://docs.github.com/en/actions/reference/workflows-and-actions/dependency-caching#restrictions-for-accessing-a-cache
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            . -> target
            src/tests/rust_guests -> target

      - name: Ensure up-to-date Cargo.lock
        run: |
          cargo fetch --locked
          cargo fetch --manifest-path src/tests/rust_guests/Cargo.toml --locked

      - name: fmt
        run: just fmt-check

      - name: Install cargo-hyperlight
        run: cargo install cargo-hyperlight --version 0.1.10 --locked --force

      - name: clippy (debug)
        run: |
          just clippy debug 
          just clippy-guests debug

      - name: clippy (release)
        run: |
          just clippy release 
          just clippy-guests release

      - name: Verify MSRV
        run: ./dev/verify-msrv.sh hyperlight-host hyperlight-guest hyperlight-guest-bin hyperlight-common

      - name: Check cargo features compile
        run: just check

      - name: Check compilation with no default features
        run: |
          just test-compilation-no-default-features debug
          just test-compilation-no-default-features release
