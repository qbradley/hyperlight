# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build Guests

on:
  workflow_call:
    inputs:
      docs_only:
        description: Skip building if docs only
        required: false
        type: string
        default: "false"
      config:
        description: Build configuration (debug or release)
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-guests:
    if: ${{ inputs.docs_only == 'false' }}
    timeout-minutes: 15
    runs-on: [self-hosted, Linux, X64, "1ES.Pool=hld-kvm-amd", "JobId=build-guests-${{ inputs.config }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hyperlight-dev/ci-setup-workflow@f6bd9cc86d0737976d2128c8b8ced8edc017cbb4  # v1.9.0
        with:
          rust-toolchain: "1.89"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix cargo home permissions
        if: runner.os == 'Linux'
        run: |
          sudo chown -R $(id -u):$(id -g) /opt/cargo || true

      # cargo-hyperlight builds a custom sysroot for x86_64-hyperlight-none target.
      # rust-cache cleans "anything not a dependency" from target dirs, removing the sysroot.
      # We cache sysroot separately to avoid rebuilding it (~10s) on every run.
      - name: Sysroot cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            src/tests/rust_guests/target/sysroot
          key: sysroot-linux-${{ inputs.config }}-${{ hashFiles('rust-toolchain.toml') }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: "guests-${{ inputs.config }}"
          cache-on-failure: "true"
          # Only save on main as caches are not shared across branches.
          # https://docs.github.com/en/actions/reference/workflows-and-actions/dependency-caching#restrictions-for-accessing-a-cache
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            . -> target
            src/tests/rust_guests -> target

      - name: Install cargo-hyperlight
        run: cargo install cargo-hyperlight --version 0.1.10 --locked --force

      - name: Build Rust guests
        run: |
          just build-rust-guests ${{ inputs.config }}
          just move-rust-guests ${{ inputs.config }}

      - name: Build C guests
        run: |
          just build-c-guests ${{ inputs.config }}
          just move-c-guests ${{ inputs.config }}

      - name: Upload Rust guests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rust-guests-${{ inputs.config }}
          path: |
            src/tests/rust_guests/bin/${{ inputs.config }}/
          retention-days: 1
          if-no-files-found: error

      - name: Upload C guests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: c-guests-${{ inputs.config }}
          path: src/tests/c_guests/bin/${{ inputs.config }}/
          retention-days: 1
          if-no-files-found: error

      - name: Upload interface.wasm
        if: inputs.config == 'debug'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: interface-wasm
          path: src/tests/rust_guests/witguest/interface.wasm
          retention-days: 1
          if-no-files-found: error

      - name: Upload twoworlds.wasm
        if: inputs.config == 'debug'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: twoworlds-wasm
          path: src/tests/rust_guests/witguest/twoworlds.wasm
          retention-days: 1
          if-no-files-found: error
